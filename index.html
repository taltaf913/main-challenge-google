<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Travel Engine PoC</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>TravelEngine</h1>
            <p>Live Itinerary</p>
        </header>

        <main>
            <div class="preferences-bar">
                <span class="badge" id="budget-badge"><i class="fa-solid fa-wallet"></i> Budget: $150</span>
                <span class="badge"><i class="fa-solid fa-person-walking"></i> Relaxed</span>
                <span class="badge"><i class="fa-solid fa-utensils"></i> Foodie</span>
            </div>

            <div class="itinerary-container" id="itinerary">
                <!-- Itinerary Items injected securely by JS -->
            </div>
        </main>

        <div class="simulator-panel">
            <h3>Simulator Console</h3>
            <div class="button-group">
                <button data-event="rain" class="sim-btn"><i class="fa-solid fa-cloud-showers-heavy"></i> Rain</button>
                <button data-event="delay" class="sim-btn"><i class="fa-solid fa-plane-slash"></i> Flight Delay</button>
                <button data-event="venue_full" class="sim-btn"><i class="fa-solid fa-users-slash"></i> Venue Full</button>
                <button data-event="over_budget" class="sim-btn"><i class="fa-solid fa-money-bill-trend-up"></i> Over Budget</button>
                <button data-event="traffic" class="sim-btn"><i class="fa-solid fa-car-burst"></i> Traffic Jam</button>
                <button id="btn-reset" class="sim-btn reset"><i class="fa-solid fa-rotate-left"></i> Reset Simulation</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden">
        <div class="toast-icon"><i class="fa-solid fa-bell"></i></div>
        <div class="toast-content">
            <h4 id="toast-title">Notification</h4>
            <p id="toast-message">Message details here.</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
