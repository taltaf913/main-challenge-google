steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/main-challenge-google:$COMMIT_SHA'
      - '.'

  # Step 2: Push image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/main-challenge-google:$COMMIT_SHA'

  # Step 3: Deploy to Cloud Run (publicly accessible)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'main-challenge-google'
      - '--image=gcr.io/$PROJECT_ID/main-challenge-google:$COMMIT_SHA'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'

timeout: '600s'

images:
  - 'gcr.io/$PROJECT_ID/main-challenge-google:$COMMIT_SHA'
